name: Run API Tests on Staging Push

"on":
  push:
    branches:
      - main

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MySpaCover test repo
        uses: actions/checkout@v3
        with:
          repository: yeshsharma/MySpaCover
          token: ${{ secrets.TEST_REPO_SECRET }} # Personal Access Token with repo access

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Run REST Assured Tests
        run: mvn test
        continue-on-error: true # pipeline won't stop even if tests fail

      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        if: always() # upload report whether tests pass or fail
        with:
          name: extent-report
          path: test-output/ # change this to wherever your extent report generates

